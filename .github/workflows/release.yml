name: Release

# Cross-builds the verifier native libs and publishes a GitHub Release with
# per-asset build-provenance attestation. Consumers verify SHA-256 + attestation
# before installing (a trust gate). Trigger by pushing a tag `vX.Y.Z`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.1.0)
        required: true

permissions:
  contents: write # create the release
  id-token: write # provenance signing
  attestations: write # attest-build-provenance

jobs:
  build:
    name: Build · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Add Apple targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      # Android jniLibs (arm64-v8a, armeabi-v7a, x86_64, x86). The ubuntu runner
      # ships the NDK; build-release.sh keys off ANDROID_NDK_HOME + cargo-ndk
      # (installed here only on Linux, so the macOS job won't also build Android).
      - name: Set up Android cross-build
        if: runner.os == 'Linux'
        shell: bash
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android
          cargo install cargo-ndk --locked
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_ROOT:-$ANDROID_NDK_HOME}}" >> "$GITHUB_ENV"

      - name: Build native libs
        shell: bash
        run: bash build-release.sh "${{ runner.temp }}/dist"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ${{ runner.temp }}/dist/*
          if-no-files-found: error
          retention-days: 3

  release:
    name: Publish + attest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: in
          pattern: dist-*
          merge-multiple: true

      - name: Stage assets (drop per-OS SHA256SUMS, recompute combined)
        shell: bash
        run: |
          mkdir -p assets
          find in -type f ! -name SHA256SUMS -exec cp {} assets/ \;
          cd assets && sha256sum * | tee SHA256SUMS

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: assets/*

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" assets/* --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" --generate-notes

  # Publish the Rust crate to crates.io via Trusted Publishing (GitHub OIDC) —
  # no long-lived token. One-time setup: add this repo + workflow as a trusted
  # publisher in the crate's crates.io settings (see RELEASING.md). Gated on the
  # cross-platform build so we never publish source that fails to compile.
  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token exchanged for a short-lived crates.io token
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
